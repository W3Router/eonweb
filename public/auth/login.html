<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EON Protocol</title>
    <link href="/eonweb/public/css/style.css"rel="stylesheet">
    <script src="/eonweb/public/js/main.js"></script>
</head>
<body>
    <div class="login-container">
        <h2>Login to EON Protocol</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
                <span id="emailError" class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <span id="passwordError" class="error-message"></span>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="links">
            <a href="../../index.html">Back to Home</a>
            <a href="/eonweb/auth/register.html">Register</a>
            <a href="/eonweb/dashboard/index.html">Dashboard</a>
        </div>
    </div>
</body>
</html>
