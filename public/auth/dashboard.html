<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Eon Protocol</title>
    <style>
        :root {
            --primary-color: #4dabf7;
            --secondary-color: #adb5bd;
            --background-color: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .welcome-message {
            font-size: 24px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .stat-label {
            color: var(--secondary-color);
        }

        .logout-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #3b8ac4;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1 class="welcome-message">Welcome, <span id="username">User</span>!</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="points">0</div>
                <div class="stat-label">Points Earned</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tasks">0</div>
                <div class="stat-label">Tasks Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rank">-</div>
                <div class="stat-label">Current Rank</div>
            </div>
        </div>
    </div>

    <script>
        // 检查用户是否已登录
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth/login';
            }
            return token;
        }

        // 加载用户数据
        async function loadUserData() {
            const token = checkAuth();
            try {
                const response = await fetch('/auth/api/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    document.getElementById('username').textContent = userData.username;
                    document.getElementById('points').textContent = userData.points || 0;
                    document.getElementById('tasks').textContent = userData.tasks || 0;
                    document.getElementById('rank').textContent = userData.rank || '-';
                } else {
                    handleLogout();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
                handleLogout();
            }
        }

        // 处理登出
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            window.location.href = '/auth/login';
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
